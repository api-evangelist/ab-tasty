    tags:
      - Decision
      - Experimentation
      - Feature Flags
      - Server Side
    description: >-
      The AB Tasty Decision API is a server-side service that evaluates a visitors
      context against your active experiments, personalizations, and feature flags,
      then returns a deterministic decision: which campaigns the user qualifies for,
      the selected variation, and any variables or content to render.
  - aid: ab-tasty:ab-tasty-remote-control-api
    name: AB Tasty Remote Control API
    humanURL: https://docs.abtasty.com/server-side/remote-control-api
    properties:
      - url: https://docs.abtasty.com/server-side/remote-control-api
        type: Documentation
    tags:
      - Remote Control
      - Campaigns
      - Experimentation
    description: >-
      AB Tastys Remote Control API is a developer and QA tool that lets you programmatically
      drive the AB Tasty SDK from outside your app or page, so you can precisely control
      and observe experiments without changing production targeting. With it, you
      can preview or force specific campaigns and variations for a visitor, toggle
      or pause experiences, set visitor/context attributes, trigger goals and custom
      events, refresh decisions, and clear caches to reproduce clean states.
  - aid: ab-tasty:ab-tasty-public-api
    name: AB Tasty Public API
    humanURL: https://docs.abtasty.com/integrations/custom-integrations/ab-tasty-public-api
    properties:
      - url: https://docs.abtasty.com/integrations/custom-integrations/ab-tasty-public-api
        type: Documentation
    tags:
      - Campaigns
      - Integrations
      - Management
    description: >-
      The AB Tasty Public API provides programmatic access to manage campaigns,
      monitor and control experiments, manage account users, and integrate AB Tasty
      with third-party tools. It uses OAuth-style credentials (ClientID and ClientSecret)
      to generate access tokens for authentication.
