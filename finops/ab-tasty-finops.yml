specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: AB Tasty
providerId: ab-tasty
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Experimentation
  - A/B Testing
  - Personalization
  - Feature Flags
  - FinOps
  - FOCUS
description: AB Tasty is sold as an annual contract priced by traffic volume and feature scope. There
  is no public per-call price; FinOps mapping focuses on the contract structure and traffic-tier meters.
notes: No public developer pricing — placeholder only. Plan price is quoted per opportunity by AB Tasty
  sales.
sources:
  - https://www.abtasty.com/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: AB Tasty SAS
serviceCategory: Experimentation / Personalization
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD/EUR
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: AB Tasty
  ServiceCategory: Experimentation / Personalization
  ProviderName: AB Tasty
  PublisherName: AB Tasty SAS
  InvoiceIssuerName: AB Tasty SAS
  BillingCurrency: USD
  PricingCategory: Subscription
meters:
  - name: monthly_unique_visitors
    description: Tracked unique visitors per month — typical traffic-tier meter for experimentation contracts.
    unit: visitor
    aggregation: max
    dimensions:
      - site
      - region
  - name: pageviews
    description: Pageviews subjected to experimentation / personalization rules.
    unit: pageview
    aggregation: sum
    dimensions:
      - site
      - campaign
  - name: feature_flag_evaluations
    description: Feature-flag evaluations served by Flagship / release-management SDKs.
    unit: evaluation
    aggregation: sum
    dimensions:
      - environment
      - feature
  - name: contract_year
    description: Annual subscription line item.
    unit: year
    aggregation: count
    dimensions:
      - plan
principles:
  - name: Visibility
    description: Use AB Tasty dashboards and the analytics export to track campaign volume against the
      contracted traffic ceiling each month.
  - name: Allocation
    description: Tag campaigns and feature flags by product team / business unit so cost can be allocated
      against the products driving experimentation volume.
  - name: Optimization
    description: Sunset stale campaigns and stop running long-tail experiments to keep traffic inside
      the contracted tier; consolidate environments.
  - name: Accountability
    description: Growth / product leadership owns the AB Tasty subscription; engineering owns Flagship
      SDK integrations. Review traffic vs contract ceiling monthly with the AB Tasty CSM.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
