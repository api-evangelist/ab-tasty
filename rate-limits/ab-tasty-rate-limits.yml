description: AB Tasty does not publish public rate-limit numbers for its experimentation, personalization,
  or feature-flag APIs. Limits are governed by the customer contract and traffic-volume tier.
notes: No public developer rate-limit documentation — placeholder only.
sources:
  - https://www.abtasty.com/pricing/
responseCodes:
  throttled: 429
limits:
  - name: Account throttling
    scope: account
    metric: varies
    limit: governed by customer contract / traffic tier; no public numeric ceiling
policies:
  - name: Contract-scoped limits
    description: Throughput is tied to the contracted traffic tier. Coordinate with AB Tasty success team
      before scaling experimentation traffic significantly.
  - name: Edge SDK behavior
    description: Most experimentation traffic is served from edge SDKs and CDNs; raw API rate limits primarily
      apply to management / admin endpoints.
