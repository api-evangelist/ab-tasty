naftiko: 1.0.0-alpha2
info:
  label: AB Tasty Decision API — Activate
  description: 'AB Tasty Decision API — Activate. 1 operations. Lead operation: AB Tasty Post Activate. Self-contained Naftiko
    capability covering one Ab Tasty business surface.'
  tags:
  - Ab Tasty
  - Activate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AB_TASTY_API_KEY: AB_TASTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: decision-activate
    baseUri: https://decision.flagship.io/v2
    description: AB Tasty Decision API — Activate business capability. Self-contained, no shared references.
    resources:
    - name: activate
      path: /activate
      operations:
      - name: postactivate
        method: POST
        description: AB Tasty Post Activate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.AB_TASTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: decision-activate-rest
    port: 8080
    description: REST adapter for AB Tasty Decision API — Activate. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/activate
      name: activate
      description: REST surface for activate.
      operations:
      - method: POST
        name: postactivate
        description: AB Tasty Post Activate
        call: decision-activate.postactivate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: decision-activate-mcp
    port: 9090
    transport: http
    description: MCP adapter for AB Tasty Decision API — Activate. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: ab-tasty-post-activate
      description: AB Tasty Post Activate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: decision-activate.postactivate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
