naftiko: "1.0.0-alpha1"

info:
  label: "AB Tasty Decision API"
  description: "Server-side decision engine for evaluating visitor context against experiments, personalizations, and feature flags, returning deterministic campaign and variation assignments."
  tags:
    - AB Tasty
    - Decision
    - Experimentation
    - Feature Flags
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AB_TASTY_API_KEY: AB_TASTY_API_KEY

capability:
  consumes:
    - type: http
      namespace: decision-api
      baseUri: https://decision.flagship.io/v2
      description: "AB Tasty Decision API for server-side experimentation and feature flagging"
      authentication:
        type: apikey
        key: x-api-key
        value: "{{AB_TASTY_API_KEY}}"
        placement: header
      resources:
        - name: campaigns
          path: /{environmentId}/campaigns
          description: "Campaign assignment operations for all campaigns"
          operations:
            - name: get-campaigns
              method: POST
              description: "Retrieve all campaign assignments for a visitor"
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: mode
                  in: query
                  type: string
                  required: false
                  description: "Response format mode (normal, simple, full)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: campaign
          path: /{environmentId}/campaigns/{campaignId}
          description: "Single campaign assignment operations"
          operations:
            - name: get-campaign
              method: POST
              description: "Retrieve a specific campaign assignment for a visitor"
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: campaignId
                  in: path
                  type: string
                  required: true
                  description: "Campaign identifier or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: flags
          path: /{environmentId}/flags
          description: "Feature flag operations"
          operations:
            - name: get-flags
              method: POST
              description: "Retrieve feature flags with values and metadata for a visitor"
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: exposeAllKeys
                  in: query
                  type: boolean
                  required: false
                  description: "If true, returns all flag keys including null values"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: activate
          path: /activate
          description: "Manual campaign activation operations"
          operations:
            - name: activate-campaign
              method: POST
              description: "Manually activate a campaign variation for a visitor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: decision-api-rest
      resources:
        - path: /v1/campaigns
          name: campaigns
          description: "Campaign assignment operations"
          operations:
            - method: POST
              name: get-campaigns
              description: "Get all campaign assignments for a visitor"
              call: "decision-api.get-campaigns"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/campaigns/{campaignId}
          name: campaign
          description: "Single campaign assignment"
          operations:
            - method: POST
              name: get-campaign
              description: "Get a specific campaign assignment"
              call: "decision-api.get-campaign"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/flags
          name: flags
          description: "Feature flag operations"
          operations:
            - method: POST
              name: get-flags
              description: "Get feature flags for a visitor"
              call: "decision-api.get-flags"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/activate
          name: activate
          description: "Campaign activation"
          operations:
            - method: POST
              name: activate-campaign
              description: "Activate a campaign variation"
              call: "decision-api.activate-campaign"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: decision-api-mcp
      transport: http
      tools:
        - name: get-campaigns
          description: "Get all campaign and variation assignments for a visitor based on their context attributes"
          hints:
            readOnly: true
            openWorld: false
          call: "decision-api.get-campaigns"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-campaign
          description: "Get a specific campaign assignment for a visitor"
          hints:
            readOnly: true
            openWorld: false
          call: "decision-api.get-campaign"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-flags
          description: "Get feature flag values and metadata for a visitor"
          hints:
            readOnly: true
            openWorld: false
          call: "decision-api.get-flags"
          outputParameters:
            - type: object
              mapping: "$."

        - name: activate-campaign
          description: "Manually activate a campaign variation assignment for a visitor"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "decision-api.activate-campaign"
          outputParameters:
            - type: object
              mapping: "$."
