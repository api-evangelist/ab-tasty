specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: AB Tasty
providerId: ab-tasty
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Experimentation
  - A/B Testing
  - Personalization
  - Feature Flags
description: AB Tasty does not publish public pricing on its plans page. The pricing page lists feature
  groups (Experimentation, Personalization, Release Management, Enterprise Security, Customer Success)
  and routes prospects to a sales demo. Plans are quoted based on traffic volume, feature set, and contract
  term.
notes: No public developer pricing — placeholder only. AB Tasty quotes per opportunity through sales.
sources:
  - https://www.abtasty.com/pricing/
plans:
  - id: ab-tasty-experimentation
    name: Experimentation
    type: enterprise
    description: A/B/n, multivariate, and split testing capabilities. Pricing quoted by sales.
    entries:
      - label: Custom contract
        name: experimentation_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: A/B/n testing
      - name: Multivariate testing
      - name: Real-time results
      - name: Unlimited variations
  - id: ab-tasty-personalization
    name: Personalization
    type: enterprise
    description: Segment-builder, AI-based targeting, and campaign prioritization. Pricing quoted by sales.
    entries:
      - label: Custom contract
        name: personalization_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Segment builder
      - name: Campaign prioritization
      - name: AI-based targeting
  - id: ab-tasty-release-management
    name: Release Management
    type: enterprise
    description: Feature flags, progressive rollouts, and mobile SDKs. Pricing quoted by sales.
    entries:
      - label: Custom contract
        name: release_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Feature flags
      - name: Progressive deployment
      - name: Mobile SDKs
  - id: ab-tasty-enterprise
    name: Enterprise
    type: enterprise
    description: Full platform with SSO, dedicated CSM, and consulting. Pricing quoted by sales.
    entries:
      - label: Custom contract
        name: enterprise_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: SSO (SAML, LDAP)
      - name: MFA
      - name: Dedicated account manager
      - name: Consulting and training
